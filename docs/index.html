<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StrataSpent</title>
<style>
  :root {
    --bg: #0F172A;
    --surface: #1E293B;
    --text: #E2E8F0;
    --muted: #94A3B8;
    --accent: #818CF8;
    --indigo: #4F46E5;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 80px 24px;
    text-align: center;
  }
  .badge {
    display: inline-block;
    background: var(--indigo);
    color: white;
    width: 84px;
    height: 84px;
    border-radius: 22px;
    margin-bottom: 24px;
    line-height: 84px;
    font-size: 44px;
    font-weight: 700;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 42px;
  }
  .tagline {
    color: var(--muted);
    font-size: 18px;
    margin-bottom: 40px;
  }
  .links a {
    display: inline-block;
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
    padding: 12px 22px;
    border-radius: 10px;
    margin: 6px;
    border: 1px solid var(--border);
    font-weight: 500;
  }
  .links a:hover { border-color: var(--accent); }
  footer {
    margin-top: 80px;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="container">
<div class="badge">S$</div>
<h1>StrataSpent</h1>
<p class="tagline">Family expenses, together. Native Android client.</p>

<div class="links">
  <a href="./privacy-policy.html">Privacy Policy</a>
</div>

<footer>
StrataSpent is an open-source Android client for shared family expense
tracking. This page exists primarily to host the Play Store privacy
policy.
</footer>
</div>
</body>
</html>
